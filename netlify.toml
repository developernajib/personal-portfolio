[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Block MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Enable XSS filter in legacy browsers
    X-XSS-Protection = "1; mode=block"
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    # Force HTTPS for 1 year, include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content Security Policy
    # - default-src: only self
    # - script-src: self + inline (theme init script in index.html)
    # - style-src: self + inline (Leaflet injects a <style> tag at runtime)
    # - img-src: self + data URIs (Leaflet marker PNGs) + cdn.simpleicons.org + github avatars
    # - font-src: self only (fonts served from /public/fonts/)
    # - connect-src: self + external APIs used at runtime
    # - frame-ancestors: none (reinforces X-Frame-Options)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://cdn.simpleicons.org https://avatars.githubusercontent.com https://*.basemaps.cartocdn.com; font-src 'self'; connect-src 'self' https://api.github.com https://github-contributions-api.jogruber.de; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; worker-src 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    # Immutable cache for Vite-hashed asset filenames
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    # Always revalidate HTML so users get fresh deploys
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
